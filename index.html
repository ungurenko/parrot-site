<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parrot — аудио и видео в текст на macOS</title>
  <link rel="icon" type="image/png" href="assets/parrot-icon-256.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ---- Parrot landing: base styles ---- */

:root {
  --bg: #FBFAF7;
  --bg-warm: #F3EFE6;
  --bg-ink: #1A1814;
  --ink: #141110;
  --ink-soft: #3A3530;
  --ink-mute: #6B645C;
  --line: #1A181410;
  --line-strong: #1A181422;

  /* rainbow accents — from parrot icon */
  --c-red:    #E4412B;
  --c-coral:  #F56A3C;
  --c-yellow: #F5C23B;
  --c-green:  #3CB04A;
  --c-blue:   #2A7DE1;
  --c-purple: #7A3EB8;

  /* per-block accent, overridable by tweaks */
  --accent: var(--c-red);

  --radius: 18px;
  --radius-lg: 28px;

  --font-display: "Instrument Serif", "Playfair Display", Georgia, serif;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 32px;
}

/* ---- Nav ---- */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: saturate(140%) blur(14px);
  -webkit-backdrop-filter: saturate(140%) blur(14px);
  border-bottom: 1px solid var(--line);
}
.nav-row {
  display: flex;
  align-items: center;
  gap: 28px;
  height: 68px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.brand img { width: 28px; height: 28px; border-radius: 7px; }
.brand .beta {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--c-yellow);
  color: #3A2A00;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.nav-links {
  display: flex;
  gap: 22px;
  margin-left: auto;
  font-size: 14.5px;
  color: var(--ink-soft);
}
.nav-links a { padding: 6px 0; transition: color .15s; }
.nav-links a:hover { color: var(--ink); }
.nav-cta {
  display: inline-flex;
  align-items: center;
  flex-shrink: 0;
  white-space: nowrap;
  gap: 8px;
  padding: 9px 16px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  transition: transform .15s ease;
}
.nav-cta:hover { transform: translateY(-1px); }
.nav-cta svg { flex-shrink: 0; width: 14px; height: 14px; }

/* ---- Section rhythm ---- */
section { padding: 112px 0; position: relative; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-mute);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
}
.section-kicker {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(40px, 5vw, 64px);
  line-height: 1.04;
  letter-spacing: -0.02em;
  max-width: 18ch;
  margin: 16px 0 0;
}
.section-kicker em { font-style: italic; color: var(--accent); }

/* ---- Buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  height: 52px;
  padding: 0 22px;
  border-radius: 999px;
  font-weight: 500;
  font-size: 15.5px;
  transition: transform .15s ease, box-shadow .2s ease;
}
.btn-primary {
  background: var(--ink);
  color: var(--bg);
  box-shadow: 0 6px 20px -8px rgba(20,17,16,.5);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 28px -8px rgba(20,17,16,.55); }
.btn-ghost {
  color: var(--ink);
  padding: 0 18px;
}
.btn-ghost:hover { color: var(--accent); }
.btn .arrow { transition: transform .2s; }
.btn:hover .arrow { transform: translateX(3px); }

/* ---- Footer / misc ---- */
.footer {
  border-top: 1px solid var(--line);
  padding: 48px 0 64px;
  color: var(--ink-mute);
  font-size: 14px;
}
.footer-row { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
.footer-row .spacer { flex: 1; }

/* animation utility */
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
.caret { display: inline-block; width: 2px; height: 1em; background: currentColor; vertical-align: -2px; margin-left: 2px; animation: blink 1s step-end infinite; }

/* rainbow hover ring */
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Reduced motion ---- */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: .001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .001ms !important;
  }
  .wave span,
  .mt-placeholder span,
  .caret { animation: none !important; }
}

/* ---- Tablet / small desktop ---- */
@media (max-width: 780px) {
  .tweaks { display: none; }
}

/* ---- Mobile (≤640px): base layout ---- */
@media (max-width: 640px) {
  .container { padding: 0 16px; }

  .nav-row { height: 56px; gap: 12px; }
  .brand img { width: 26px; height: 26px; border-radius: 6px; }
  .brand-name { font-size: 15px; }
  .brand .beta { padding: 2px 6px; font-size: 10px; }

  .nav-cta {
    padding: 8px 12px;
    height: 40px;
    min-width: 44px;
    font-size: 13px;
    gap: 6px;
  }
  .nav-cta-label-full { display: none; }
  .nav-cta-label-short { display: inline; }

  .btn { height: 48px; padding: 0 20px; font-size: 15px; }
  .btn-primary { width: 100%; justify-content: center; }
  .btn-ghost { width: 100%; justify-content: center; }
}

@media (min-width: 641px) {
  .nav-cta-label-short { display: none; }
}

/* ---- Very narrow (≤380px / iPhone SE) ---- */
@media (max-width: 380px) {
  .brand-name { display: none; }
  .container { padding: 0 14px; }
}

/* ---- Sticky bottom CTA (mobile only) ---- */
.sticky-cta {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: saturate(140%) blur(12px);
  -webkit-backdrop-filter: saturate(140%) blur(12px);
  border-top: 1px solid var(--line-strong);
  z-index: 60;
  transform: translateY(110%);
  transition: transform .28s cubic-bezier(.2,.7,.2,1);
  pointer-events: none;
}
.sticky-cta.is-visible { transform: translateY(0); pointer-events: auto; }
.sticky-cta .btn-primary {
  width: 100%;
  height: 52px;
  justify-content: center;
  margin: 0;
}

@media (min-width: 781px) {
  .sticky-cta { display: none !important; }
}

/* ---- Hero ---- */
.hero {
  padding: 72px 0 120px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  /* soft rainbow bloom behind hero */
  content: "";
  position: absolute;
  top: -200px; right: -200px;
  width: 900px; height: 900px;
  background:
    radial-gradient(circle at 30% 30%, color-mix(in srgb, var(--c-red) 20%, transparent) 0%, transparent 55%),
    radial-gradient(circle at 70% 40%, color-mix(in srgb, var(--c-yellow) 20%, transparent) 0%, transparent 55%),
    radial-gradient(circle at 50% 75%, color-mix(in srgb, var(--c-blue) 14%, transparent) 0%, transparent 55%);
  filter: blur(40px);
  pointer-events: none;
  z-index: 0;
}
.hero-grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: minmax(0, 1.02fr) minmax(0, 1.3fr);
  gap: 64px;
  align-items: center;
}

.hero--stack .hero-grid { grid-template-columns: 1fr; text-align: center; justify-items: center; }
.hero--stack .hero-copy { max-width: 720px; }
.hero--stack .hero-actions { justify-content: center; }
.hero--stack .hero-eyebrow { justify-content: center; }

.hero--big-type .hero-grid { grid-template-columns: 1fr; }
.hero--big-type .hero-h1 { font-size: clamp(64px, 10vw, 148px); }
.hero--big-type .hero-mock { max-width: 820px; margin: 40px auto 0; }

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  letter-spacing: 0.04em;
  color: var(--ink-soft);
  padding: 8px 14px 8px 10px;
  background: #fff;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
}
.ribbon { display: inline-flex; gap: 3px; }
.ribbon .rb { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

.hero-h1 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(56px, 8.2vw, 112px);
  line-height: 0.95;
  letter-spacing: -0.025em;
  margin: 22px 0 22px;
  color: var(--ink);
}
.hero-h1 em {
  font-style: italic;
  background: linear-gradient(95deg, var(--c-red), var(--c-coral) 28%, var(--c-yellow) 52%, var(--c-green) 74%, var(--c-blue));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.hero-sub {
  font-size: 19px;
  line-height: 1.55;
  color: var(--ink-soft);
  max-width: 48ch;
  margin: 0 0 32px;
  text-wrap: balance;
}
.hero--stack .hero-sub { margin-inline: auto; }
.hero-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.hero-meta {
  margin-top: 28px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--ink-mute);
  letter-spacing: 0.02em;
}
.hero-meta .dot-mono { color: var(--c-green); margin-right: 8px; }

/* ---- Mac-style mockup ---- */
.hero-mock { position: relative; }
.mock-glow {
  position: absolute;
  inset: -60px -40px -40px -40px;
  background:
    radial-gradient(ellipse at 20% 30%, color-mix(in srgb, var(--c-red) 25%, transparent), transparent 60%),
    radial-gradient(ellipse at 80% 40%, color-mix(in srgb, var(--c-blue) 22%, transparent), transparent 60%),
    radial-gradient(ellipse at 60% 85%, color-mix(in srgb, var(--c-yellow) 25%, transparent), transparent 60%);
  filter: blur(35px);
  z-index: 0;
  opacity: .7;
}
.mock-shadow {
  position: absolute;
  inset: 30px 20px -20px 20px;
  background: #1A181430;
  filter: blur(40px);
  z-index: 0;
}

.mock {
  position: relative;
  z-index: 1;
  background: #FDFCF9;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #1A181412;
  box-shadow:
    0 1px 0 #ffffff inset,
    0 30px 60px -30px rgba(20, 17, 16, .35),
    0 80px 120px -60px rgba(20, 17, 16, .25);
}

.mock-chrome {
  height: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  background: linear-gradient(180deg, #F4F0E8, #EAE5DB);
  border-bottom: 1px solid #1A18140E;
  position: relative;
}
.mock-chrome .dot {
  width: 12px; height: 12px; border-radius: 50%;
  display: inline-block;
}
.mock-chrome .dot.r { background: #ED6A5E; box-shadow: inset 0 0 0 1px #00000015; }
.mock-chrome .dot.y { background: #F5BF4F; box-shadow: inset 0 0 0 1px #00000015; }
.mock-chrome .dot.g { background: #61C454; box-shadow: inset 0 0 0 1px #00000015; }
.mock-title {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 500; color: var(--ink-soft);
}
.mock-title img { width: 18px; height: 18px; border-radius: 4px; }

.mock-body {
  display: grid;
  grid-template-columns: 200px 1fr;
  min-height: 440px;
}

.mock-sidebar {
  background: #F7F3EA;
  border-right: 1px solid #1A18140E;
  padding: 14px 10px;
  display: flex;
  flex-direction: column;
}
.ms-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 2px;
}
.ms-item.active {
  background: #fff;
  color: var(--ink);
  box-shadow: 0 1px 2px #00000008, 0 0 0 1px #1A181410;
  font-weight: 500;
}
.ms-i {
  width: 20px; height: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 5px;
  background: #fff;
  box-shadow: 0 0 0 1px #1A181410;
  font-size: 12px;
  color: var(--ink-soft);
}
.ms-item.active .ms-i { background: var(--c-red); color: #fff; box-shadow: none; }
.ms-sidebar-bottom { margin-top: auto; padding-top: 12px; }
.ms-model {
  background: #fff;
  border: 1px solid #1A181410;
  border-radius: 10px;
  padding: 10px;
  display: flex; gap: 10px; align-items: center;
}
.ms-model-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--c-green);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--c-green) 22%, transparent);
}
.ms-model-name { font-size: 12px; font-weight: 500; }
.ms-model-sub { font-size: 11px; color: var(--ink-mute); font-family: var(--font-mono); }

.mock-main {
  padding: 18px 20px 20px;
  display: flex; flex-direction: column;
  gap: 14px;
  min-width: 0;
}

.mock-tabs { display: flex; gap: 4px; }
.tab {
  padding: 6px 12px;
  font-size: 13px;
  border-radius: 7px;
  color: var(--ink-mute);
}
.tab.active { background: #1A18140A; color: var(--ink); font-weight: 500; }

.mock-input {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: #fff;
  border: 1px solid #1A181418;
  border-radius: 10px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink);
  box-shadow: 0 1px 0 #00000004;
}
.mock-input .mi-icon { color: var(--c-blue); }
.mock-input .mi-text { color: var(--c-blue); text-decoration: underline; text-decoration-color: #2A7DE140; text-underline-offset: 3px; }
.mock-input .mi-go {
  margin-left: auto;
  background: var(--ink);
  color: var(--bg);
  width: 24px; height: 24px;
  border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.mock-input.is-typing { border-color: #2A7DE140; box-shadow: 0 0 0 3px #2A7DE115; }

.mock-status {
  background: #F7F3EA;
  border: 1px solid #1A18140A;
  border-radius: 12px;
  padding: 12px 14px;
}
.ms-row { display: flex; gap: 14px; align-items: center; }
.ms-status-label {
  font-size: 12.5px;
  color: var(--ink-soft);
  font-family: var(--font-mono);
  letter-spacing: 0.01em;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ms-status-meter { flex: 1.6; min-width: 0; }

.wave {
  display: flex; align-items: center; gap: 2px;
  height: 26px;
  width: 100%;
}
.wave span {
  flex: 1;
  min-width: 2px;
  background: linear-gradient(180deg, var(--c-coral), var(--c-red));
  border-radius: 2px;
  transition: height .08s linear;
  display: block;
}
.wave span:nth-child(6n+1) { background: linear-gradient(180deg, var(--c-red), #c32c18); }
.wave span:nth-child(6n+2) { background: linear-gradient(180deg, var(--c-coral), var(--c-red)); }
.wave span:nth-child(6n+3) { background: linear-gradient(180deg, var(--c-yellow), var(--c-coral)); }
.wave span:nth-child(6n+4) { background: linear-gradient(180deg, var(--c-green), #2a8c39); }
.wave span:nth-child(6n+5) { background: linear-gradient(180deg, var(--c-blue), #1a5eb0); }
.wave span:nth-child(6n+6) { background: linear-gradient(180deg, var(--c-purple), #4f2289); }

.ms-progress {
  margin-top: 10px;
  height: 4px;
  background: #1A18140F;
  border-radius: 3px;
  overflow: hidden;
}
.ms-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--c-red), var(--c-yellow), var(--c-green), var(--c-blue));
  transition: width .6s ease;
}

.mock-transcript {
  flex: 1;
  background: #fff;
  border: 1px solid #1A181410;
  border-radius: 12px;
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 160px;
}
.mt-head {
  display: flex; gap: 12px; align-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.02em;
  border-bottom: 1px dashed #1A18141F;
  padding-bottom: 8px;
}
.mt-time { color: var(--c-red); font-weight: 500; }
.mt-body {
  display: flex; flex-direction: column; gap: 8px;
  font-size: 14px; line-height: 1.55;
  color: var(--ink);
}
.mt-line {
  margin: 0;
  display: flex; gap: 12px;
  animation: fadeUp .35s ease both;
}
.mt-ts {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  padding-top: 3px;
  min-width: 42px;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.mt-placeholder { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
.mt-placeholder span {
  height: 10px;
  background: linear-gradient(90deg, #1A18140A, #1A181416, #1A18140A);
  background-size: 200% 100%;
  border-radius: 5px;
  animation: shimmer 1.4s ease-in-out infinite;
}
.mt-placeholder span:nth-child(1) { width: 94%; }
.mt-placeholder span:nth-child(2) { width: 88%; }
.mt-placeholder span:nth-child(3) { width: 70%; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

@media (max-width: 980px) {
  .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  .mock-body { grid-template-columns: 1fr; }
  .mock-sidebar { display: none; }
}

/* ---- Hero mobile (≤640px) ---- */
@media (max-width: 640px) {
  .hero { padding: 32px 0 56px; }
  .hero::before {
    width: 600px;
    height: 600px;
    top: -120px;
    right: -220px;
    filter: blur(48px);
  }

  .hero-grid { gap: 28px; }

  .hero-eyebrow {
    font-size: 11px;
    padding: 6px 10px 6px 8px;
    gap: 8px;
  }
  .hero-eyebrow .ribbon { display: none; }

  .hero-h1 {
    font-size: clamp(40px, 10vw, 56px);
    line-height: 1.0;
    margin: 18px 0 16px;
  }
  .hero-sub {
    font-size: 16px;
    line-height: 1.5;
    max-width: none;
    margin: 0 0 24px;
  }

  .hero-actions {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    width: 100%;
  }
  .hero-meta { margin-top: 20px; font-size: 11.5px; }

  /* App mockup — компактнее */
  .mock-chrome { height: 32px; padding: 0 10px; gap: 8px; }
  .mock-chrome .dot { width: 10px; height: 10px; }
  .mock-title { font-size: 12px; gap: 6px; }
  .mock-title img { width: 14px; height: 14px; }

  .mock-body { min-height: 360px; }
  .mock-main { padding: 12px 12px 14px; gap: 10px; }

  .mock-tabs .tab {
    padding: 6px 10px;
    font-size: 12px;
    min-height: 32px;
  }

  .mock-input {
    padding: 10px 12px;
    font-size: 12px;
    gap: 8px;
  }
  .mock-input .mi-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
    flex: 1;
  }

  .mock-status { padding: 10px 12px; }
  .ms-row { flex-wrap: wrap; gap: 8px; }
  .ms-status-label { font-size: 11.5px; white-space: normal; flex: 1 1 100%; }
  .ms-status-meter { flex: 1 1 100%; }
  .wave { height: 20px; }

  .mock-transcript { padding: 12px; min-height: 120px; }
  .mt-head { flex-wrap: wrap; gap: 6px; font-size: 10.5px; }
  .mt-body { font-size: 13.5px; }
  .mt-line { gap: 8px; }
  .mt-ts { min-width: 36px; font-size: 10.5px; }
}

/* ---- Hero very narrow (≤380px) ---- */
@media (max-width: 380px) {
  .hero-h1 { font-size: clamp(36px, 11vw, 48px); }
  .mock-body { min-height: 320px; }
  .mock-main { padding: 10px 10px 12px; }
}

/* Section styles: features, how, privacy, models, cta */

.sec { padding: 120px 0; position: relative; }
.sec-head {
  display: grid;
  grid-template-columns: 1fr minmax(260px, 420px);
  gap: 48px;
  align-items: end;
  margin-bottom: 64px;
}
.sec-lead {
  font-size: 17px;
  line-height: 1.6;
  color: var(--ink-soft);
  margin: 0;
  text-wrap: pretty;
}

/* ---- Features ---- */
.feature-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
.feat {
  background: #fff;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-lg);
  padding: 26px 26px 28px;
  display: flex; flex-direction: column;
  gap: 14px;
  transition: transform .2s ease, box-shadow .25s ease, border-color .2s;
  position: relative;
  overflow: hidden;
}
.feat::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 10%, transparent), transparent 40%);
  opacity: 0;
  transition: opacity .25s;
  pointer-events: none;
}
.feat:hover {
  transform: translateY(-4px);
  box-shadow: 0 30px 60px -30px rgba(20,17,16,.25);
  border-color: color-mix(in srgb, var(--accent) 40%, var(--line-strong));
}
.feat:hover::before { opacity: 1; }
.feat-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}
.feat-n {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--accent);
  font-weight: 500;
}
.feat-title {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 32px;
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin: 4px 0 0;
}
.feat-text {
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink-soft);
  margin: 0;
  text-wrap: pretty;
}

/* feature visuals */
.fv {
  width: 140px; height: 70px;
  border-radius: 12px;
  padding: 10px;
  display: flex; flex-direction: column; gap: 6px; justify-content: space-between;
  background: color-mix(in srgb, var(--accent) 8%, #fff);
  border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
}
.fv-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.fv-bars { display: flex; gap: 2px; align-items: flex-end; height: 32px; }
.fv-bars span { flex: 1; background: var(--accent); border-radius: 2px; display: block; min-height: 10%; }

.fv-vid { position: relative; height: 34px; background: #fff; border-radius: 6px; overflow: hidden; border: 1px solid var(--line-strong); }
.fv-vid-top { display: flex; gap: 3px; padding: 4px 5px; border-bottom: 1px solid var(--line-strong); }
.fv-vid-top span { width: 5px; height: 5px; border-radius: 50%; background: #1A18141A; }
.fv-vid-top span:first-child { background: var(--accent); }
.fv-vid-tl { position: relative; height: 16px; padding: 4px 6px; }
.fv-vid-track { background: color-mix(in srgb, var(--accent) 25%, transparent); height: 4px; border-radius: 2px; width: 100%; }
.fv-vid-head { position: absolute; left: 40%; top: 2px; bottom: 2px; width: 2px; background: var(--accent); }

.fv-url { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid var(--line-strong); border-radius: 6px; padding: 6px 8px; }
.fv-url-icon {
  flex-shrink: 0;
  width: 16px; height: 16px; min-width: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff; border-radius: 3px; font-size: 9px;
  line-height: 1;
  align-self: center;
}
.fv-url { align-items: center; }
.fv-url-text { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fv-url-text { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-soft); }

/* ---- How it works ---- */
.how-grid {
  display: grid;
  grid-template-columns: minmax(0, 0.85fr) minmax(0, 1.15fr);
  gap: 56px;
  align-items: start;
}
.how-steps { display: flex; flex-direction: column; gap: 10px; }
.how-step {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 20px;
  padding: 22px 22px 22px 22px;
  border-radius: 18px;
  background: #fff;
  border: 1px solid var(--line-strong);
  position: relative;
  transition: border-color .2s, transform .2s;
}
.how-step:hover { border-color: color-mix(in srgb, var(--accent) 50%, var(--line-strong)); transform: translateX(3px); }
.how-n {
  font-family: var(--font-display);
  font-size: 44px;
  font-style: italic;
  line-height: 1;
  color: var(--accent);
  font-weight: 400;
  padding-top: 2px;
}
.how-title {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 26px;
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin: 0 0 6px;
}
.how-text {
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--ink-soft);
  margin: 0;
}
.how-bar {
  grid-column: 1 / -1;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), transparent 80%);
  border-radius: 2px;
  opacity: .6;
}

.how-mock { position: sticky; top: 92px; }
.how-mock .mock-shadow { inset: 20px 10px -15px 10px; }

/* ---- Privacy ---- */
.sec-privacy { padding-top: 60px; }
.privacy-card {
  background: var(--bg-ink);
  color: #F5F1E8;
  border-radius: 36px;
  padding: 80px 72px;
  position: relative;
  overflow: hidden;
  display: grid;
  grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
  gap: 64px;
}
.privacy-card .eyebrow { color: #F5F1E880; }
.privacy-card .eyebrow .dot { background: var(--c-green); }
.section-kicker-invert {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(40px, 5vw, 64px);
  line-height: 1.04;
  letter-spacing: -0.02em;
  margin: 14px 0 20px;
}
.section-kicker-invert em {
  font-style: italic;
  background: linear-gradient(95deg, var(--c-red), var(--c-yellow) 40%, var(--c-green) 70%, var(--c-blue));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
}
.privacy-lead {
  font-size: 17px; line-height: 1.6;
  color: #F5F1E8B3;
  max-width: 44ch;
  text-wrap: pretty;
}

.privacy-pts { display: flex; flex-direction: column; gap: 14px; z-index: 1; }
.pp {
  background: #ffffff0a;
  border: 1px solid #ffffff18;
  border-radius: 16px;
  padding: 18px 22px;
  backdrop-filter: blur(6px);
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr;
  grid-template-rows: auto auto;
  gap: 2px 16px;
  align-items: center;
}
.pp-check {
  grid-row: 1 / 3;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
}
.pp-title { font-family: var(--font-display); font-size: 24px; letter-spacing: -0.01em; }
.pp-sub { font-family: var(--font-mono); font-size: 12px; color: #F5F1E880; letter-spacing: 0.02em; }

.privacy-deco {
  position: absolute;
  right: -80px; top: 50%;
  transform: translateY(-50%);
  width: 320px; height: 320px;
  pointer-events: none;
  opacity: .35;
}
.pd-disc {
  position: absolute; inset: 60px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 80px color-mix(in srgb, var(--c-red) 60%, transparent);
}
.pd-disc img { width: 100%; height: 100%; object-fit: cover; }
.pd-ring {
  position: absolute; inset: 0;
  border: 1px dashed #ffffff30;
  border-radius: 50%;
}
.pd-ring-2 { inset: 30px; border-color: #ffffff20; }

/* ---- Models ---- */
.models-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.model {
  background: #fff;
  border: 1px solid var(--line-strong);
  border-radius: 22px;
  padding: 22px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative;
  transition: transform .2s, box-shadow .25s, border-color .2s;
}
.model:hover {
  transform: translateY(-3px);
  box-shadow: 0 24px 48px -24px rgba(20,17,16,.2);
  border-color: color-mix(in srgb, var(--accent) 35%, var(--line-strong));
}
.model-head { display: flex; justify-content: space-between; align-items: center; }
.model-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--accent);
  padding: 4px 8px;
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  border-radius: 999px;
}
.model-size { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-mute); }
.model-name {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 28px;
  line-height: 1.05;
  letter-spacing: -0.01em;
  margin: 4px 0 0;
}
.model-text {
  font-size: 14px;
  line-height: 1.5;
  color: var(--ink-soft);
  margin: 0 0 auto;
  min-height: 42px;
}
.model-spec {
  display: flex; flex-direction: column; gap: 6px;
  padding: 12px 0;
  border-top: 1px dashed var(--line-strong);
}
.ms-item2 { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; }
.ms-label { font-family: var(--font-mono); color: var(--ink-mute); font-size: 11.5px; letter-spacing: 0.02em; }
.ms-dots { display: flex; gap: 3px; }
.ms-dots span {
  width: 8px; height: 8px; border-radius: 50%;
  background: #1A18141A;
}
.ms-dots span.on { background: var(--accent); }
.model-dl {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-radius: 10px;
  background: #1A18140A;
  color: var(--ink);
  font-size: 13px; font-weight: 500;
  transition: background .15s;
}
.model-dl:hover { background: var(--accent); color: #fff; }

/* ---- Final CTA ---- */
.sec-cta { padding-bottom: 40px; }
.cta-card {
  background: #fff;
  border: 1px solid var(--line-strong);
  border-radius: 36px;
  padding: 80px 72px;
  text-align: center;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 20% 100%, color-mix(in srgb, var(--c-red) 12%, transparent), transparent 60%),
    radial-gradient(ellipse at 80% 0%, color-mix(in srgb, var(--c-blue) 10%, transparent), transparent 60%),
    #fff;
}
.cta-ribbon {
  display: inline-flex; gap: 4px;
  padding: 6px; border-radius: 999px; background: #fff;
  border: 1px solid var(--line-strong);
  margin-bottom: 24px;
}
.cta-ribbon i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
.cta-h {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(48px, 7vw, 96px);
  line-height: 1;
  letter-spacing: -0.025em;
  margin: 0 0 20px;
}
.cta-h em {
  font-style: italic;
  background: linear-gradient(95deg, var(--c-red), var(--c-coral) 30%, var(--c-yellow) 55%, var(--c-green) 75%, var(--c-blue));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
}
.cta-sub { font-size: 18px; color: var(--ink-soft); max-width: 48ch; margin: 0 auto 32px; text-wrap: pretty; }
.cta-actions { display: inline-flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
.cta-meta { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-mute); letter-spacing: 0.03em; }

/* ---- Tweaks panel ---- */
.tweaks {
  position: fixed;
  right: 24px; bottom: 24px;
  z-index: 1000;
  width: 260px;
  background: #fff;
  border: 1px solid var(--line-strong);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 24px 60px -24px rgba(20,17,16,.3);
  font-size: 13px;
}
.tweaks-h { display: flex; align-items: center; justify-content: space-between; font-weight: 600; margin-bottom: 12px; font-size: 13px; }
.tweaks-h button { font-size: 11px; color: var(--ink-mute); }
.tweaks-group { margin-bottom: 14px; }
.tweaks-group:last-child { margin-bottom: 0; }
.tweaks-label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.06em; color: var(--ink-mute); text-transform: uppercase; margin-bottom: 8px; }
.tweaks-swatches { display: flex; gap: 6px; }
.tweaks-swatch {
  width: 28px; height: 28px; border-radius: 8px;
  position: relative;
  cursor: pointer;
  box-shadow: 0 0 0 1px #1A18141A inset;
}
.tweaks-swatch.on { box-shadow: 0 0 0 2px var(--ink); transform: scale(1.05); }
.tweaks-segments { display: flex; background: #1A18140A; border-radius: 8px; padding: 2px; }
.tweaks-segments button {
  flex: 1;
  padding: 7px 8px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--ink-soft);
}
.tweaks-segments button.on { background: #fff; color: var(--ink); font-weight: 500; box-shadow: 0 1px 2px #00000010; }

/* ---- Responsive ---- */
@media (max-width: 1080px) {
  .models-grid { grid-template-columns: repeat(2, 1fr); }
  .how-grid { grid-template-columns: 1fr; gap: 32px; }
  .how-mock { position: relative; top: 0; }
  .privacy-card { grid-template-columns: 1fr; padding: 48px 32px; }
  .feature-grid { grid-template-columns: 1fr; }
  .sec-head { grid-template-columns: 1fr; gap: 24px; }
}
/* ---- Models carousel (mobile / tablet) ---- */
@media (max-width: 780px) {
  .models-grid {
    display: flex;
    grid-template-columns: none;
    gap: 12px;
    overflow-x: auto;
    overflow-y: visible;
    scroll-snap-type: x mandatory;
    scroll-padding: 16px;
    padding: 4px 16px 16px;
    margin: 0 -16px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .models-grid::-webkit-scrollbar { display: none; }

  .model {
    flex: 0 0 calc(88% - 12px);
    scroll-snap-align: start;
    scroll-snap-stop: always;
  }

  .models-dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
  }
  .models-dot {
    position: relative;
    width: 8px;
    height: 8px;
    min-width: 8px;
    border-radius: 50%;
    background: #1A18141F;
    border: 0;
    padding: 0;
    cursor: pointer;
    transition: background .2s, transform .2s;
  }
  .models-dot::before {
    content: "";
    position: absolute;
    inset: -18px;
  }
  .models-dot.on {
    background: var(--c-blue);
    transform: scale(1.25);
  }
}

@media (min-width: 781px) {
  .models-dots { display: none; }
}

/* ---- Mobile refinements (≤640px): sections ---- */
@media (max-width: 640px) {
  .container { padding: 0 16px; }
  .nav-links { display: none; }

  .sec { padding: 64px 0; }
  .sec-head { margin-bottom: 36px; gap: 20px; }
  .section-kicker { font-size: clamp(32px, 8vw, 44px); }
  .sec-lead { font-size: 15.5px; }

  /* Features */
  .feat { padding: 20px 18px 22px; border-radius: 22px; gap: 12px; }
  .feat-title { font-size: 24px; }
  .feat-text { font-size: 14.5px; }
  .fv { width: 140px; height: 60px; padding: 8px; gap: 4px; }
  .fv-tag { white-space: nowrap; }

  /* How */
  .how-grid { gap: 20px; }
  .how-step { padding: 18px; gap: 14px; border-radius: 16px; }
  .how-n { font-size: 36px; }
  .how-title { font-size: 22px; }
  .how-bar { display: none; }
  .how-mock { position: static; top: 0; }

  /* Privacy */
  .privacy-deco { display: none; }
  .privacy-card {
    padding: 36px 22px;
    border-radius: 28px;
    gap: 28px;
  }
  .section-kicker-invert { font-size: clamp(32px, 8vw, 40px); }
  .privacy-lead { font-size: 15.5px; }
  .pp {
    padding: 14px 16px;
    grid-template-columns: auto 1fr;
    gap: 2px 12px;
  }
  .pp-check { width: 32px; height: 32px; }
  .pp-title { font-size: 19px; }

  /* Models */
  .model { padding: 20px; border-radius: 20px; }
  .model-name { font-size: 24px; }
  .model-dl {
    padding: 12px 14px;
    min-height: 44px;
    justify-content: center;
  }

  /* CTA */
  .sec-cta { padding-bottom: 24px; }
  .cta-card { padding: 44px 22px; border-radius: 28px; }
  .cta-h {
    font-size: clamp(34px, 8.5vw, 48px);
    margin: 0 0 14px;
  }
  .cta-sub { font-size: 15.5px; margin-bottom: 22px; }
  .cta-actions {
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }
  .cta-actions .btn-primary { width: 100%; }
  .cta-meta { font-size: 12px; }
  .cta-ribbon i { width: 8px; height: 8px; }

  /* Footer */
  .footer-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
  .footer-row .spacer { display: none; }
}

/* Safe-area: запас под sticky-cta */
@media (max-width: 780px) {
  .footer {
    padding-bottom: calc(120px + env(safe-area-inset-bottom, 0px));
  }
}

  <script type="text/babel" data-presets="react">
/* Hero section with mac app mockup + live demo */

function Waveform({ playing }) {
  // 40 bars, heights cycle with time if playing
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    if (!playing) return;
    const id = setInterval(() => setTick(t => t + 1), 90);
    return () => clearInterval(id);
  }, [playing]);
  const bars = React.useMemo(() => {
    const arr = [];
    for (let i = 0; i < 56; i++) {
      // deterministic pseudo-random base heights
      const base = 0.2 + Math.abs(Math.sin(i * 1.7) * 0.35) + Math.abs(Math.cos(i * 0.43) * 0.35);
      arr.push(base);
    }
    return arr;
  }, []);
  return (
    <div className="wave">
      {bars.map((b, i) => {
        const phase = playing ? Math.sin((tick + i * 0.6) * 0.35) * 0.3 : 0;
        const h = Math.max(0.12, Math.min(1, b + phase));
        return <span key={i} style={{ height: `${h * 100}%` }} />;
      })}
    </div>
  );
}

function TypedLine({ text, speed = 22, start = true, onDone }) {
  const [n, setN] = React.useState(0);
  React.useEffect(() => {
    if (!start) return;
    if (n >= text.length) { onDone && onDone(); return; }
    const id = setTimeout(() => setN(n + 1), speed);
    return () => clearTimeout(id);
  }, [n, start, text, speed]);
  return <span>{text.slice(0, n)}{start && n < text.length && <span className="caret" />}</span>;
}

function AppMockup({ variant }) {
  // states: 0=url pasted, 1=processing w/ wave, 2=transcribing lines, 3=done
  const [stage, setStage] = React.useState(0);
  const [line1Done, setLine1Done] = React.useState(false);
  const [line2Done, setLine2Done] = React.useState(false);
  const [line3Done, setLine3Done] = React.useState(false);

  React.useEffect(() => {
    const t1 = setTimeout(() => setStage(1), 1200);
    const t2 = setTimeout(() => setStage(2), 3200);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  React.useEffect(() => {
    if (line3Done) {
      const t = setTimeout(() => {
        // restart loop
        setStage(0);
        setLine1Done(false);
        setLine2Done(false);
        setLine3Done(false);
        setTimeout(() => setStage(1), 1200);
        setTimeout(() => setStage(2), 3200);
      }, 4200);
      return () => clearTimeout(t);
    }
  }, [line3Done]);

  const url = "https://youtube.com/watch?v=parrot-demo-4k";

    }
  ];

  const trackRef = React.useRef(null);
  const [active, setActive] = React.useState(0);

  const cardOffset = (t, i) => {
    const card = t.children[i];
    return card ? card.offsetLeft - t.offsetLeft : 0;
  };

  const onScroll = () => {
    const t = trackRef.current;
    if (!t) return;
    const left = t.scrollLeft;
    let best = 0;
    let bestDist = Infinity;
    for (let i = 0; i < models.length; i++) {
      const d = Math.abs(cardOffset(t, i) - left);
      if (d < bestDist) { bestDist = d; best = i; }
    }
    setActive(best);

  const goTo = (i) => {
    const t = trackRef.current;
    if (!t) return;
    t.scrollTo({ left: cardOffset(t, i), behavior: "smooth" });

                Скачать модель
              </button>
            </article>
          ))}
        </div>

        <div className="models-dots" role="tablist" aria-label="Навигация по моделям">

/* Main app — assembles everything, tweaks panel, edit-mode host protocol */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentTheme": "rainbow",
  "heroVariant": "stack"
}/*EDITMODE-END*/;

const ACCENT_THEMES = {
  rainbow: null, // per-section colors
  coral:   "var(--c-red)",
  green:   "var(--c-green)",
  blue:    "var(--c-blue)",
  yellow:  "var(--c-yellow)"
};

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);

  // Apply accent override globally when not rainbow
  React.useEffect(() => {
    const override = ACCENT_THEMES[tweaks.accentTheme];
    const root = document.documentElement;
    if (override) root.style.setProperty("--accent-override", override);
    else root.style.removeProperty("--accent-override");
    // toggle body class so sections can read override
    document.body.classList.toggle("accent-mono", !!override);
  }, [tweaks.accentTheme]);

  // host protocol for Tweaks toggle
  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === "__activate_edit_mode") setEditMode(true);
      if (e.data.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", handler);
    // now announce availability
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  function update(key, val) {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: val } }, "*");
  }

  return (
    <>
      <Nav />
      <Hero variant={tweaks.heroVariant} />
      <FeatureRow />
      <HowItWorks />
      <Privacy />
      <Models />
      <FinalCTA />
      <Footer />
      <StickyCTA />
      {editMode && <TweaksPanel tweaks={tweaks} update={update} />}
    </>
  );
}

function StickyCTA() {
  const [visible, setVisible] = React.useState(false);

  React.useEffect(() => {
    const hero = document.querySelector("section.hero");
    const footer = document.querySelector(".footer");
    if (!hero || !footer) return;

    let heroPassed = false;
    let footerReached = false;

    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.target === hero) {
            heroPassed = e.boundingClientRect.top < 0 && !e.isIntersecting;
          }
          if (e.target === footer) {
            footerReached = e.isIntersecting;
          }
        });
        setVisible(heroPassed && !footerReached);
      },
      { threshold: 0 }
    );
    io.observe(hero);
    io.observe(footer);
    return () => io.disconnect();
  }, []);

  return (
    <div className={`sticky-cta ${visible ? "is-visible" : ""}`} aria-hidden={!visible}>
      <a className="btn btn-primary" href={window.PARROT_DOWNLOAD || "#"} tabIndex={visible ? 0 : -1}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Скачать для macOS
      </a>
    </div>
  );
}
